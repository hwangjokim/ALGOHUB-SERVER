name: ALGOHUB CI


on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  checks: write
  pull-requests: write


jobs:

  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup DEV_NAME, CREDENTIAL_NAME, CREDENTIAL_PW
        run: | 
          echo "DEV_NAME=${{ secrets.DEV_NAME_TEST }}" >> $GITHUB_ENV 
          echo "CREDENTIAL_NAME=${{ secrets.CREDENTIAL_NAME }}" >> $GITHUB_ENV 
          echo "CREDENTIAL_PW=${{ secrets.CREDENTIAL_PW }}" >> $GITHUB_ENV 


      - uses: actions/checkout@v3
      - name: JDK 21 Setup
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test with Gradle
        uses: gradle/gradle-build-action@v2.6.0
        with:
          arguments: -Dspring.profiles.active=dev --info test

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: ${{ always() }}
        with:
          files: build/test-results/**/*.xml